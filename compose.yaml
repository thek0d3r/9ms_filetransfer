name: 9ms

networks:
  default:
    ipam:
      config:
        - subnet: 10.253.9.0/24

services:
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8002:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy

  web:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      CLAMAV_HOST: clamav
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build: .
    restart: unless-stopped
    command: ["./node_modules/.bin/tsx", "src/worker.ts"]
    env_file:
      - path: .env
        required: false
    environment:
      CLAMAV_HOST: clamav
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      clamav:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: 9ms
      POSTGRES_USER: 9ms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-now}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 9ms -d 9ms"]
      interval: 5s
      timeout: 5s
      retries: 20

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - ${VALKEY_DATA_DIR:-./data/valkey}:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  clamav:
    # The Alpine `stable` image is amd64-only. The official Debian image is
    # multi-architecture and runs natively on Oracle Ampere (linux/arm64/v8).
    image: clamav/clamav:1.5-debian
    restart: unless-stopped
    environment:
      # Keep signatures fresher than the image default (one check per day).
      FRESHCLAM_CHECKS: ${CLAMAV_FRESHCLAM_CHECKS:-6}
      # Match the Premium upload ceiling and never silently treat scan limits
      # or content ClamAV cannot inspect as clean.
      CLAMD_CONF_StreamMaxLength: ${CLAMAV_STREAM_MAX_LENGTH:-10240M}
      CLAMD_CONF_MaxScanSize: ${CLAMAV_MAX_SCAN_SIZE:-10240M}
      CLAMD_CONF_MaxFileSize: ${CLAMAV_MAX_FILE_SIZE:-10240M}
      CLAMD_CONF_MaxScanTime: ${CLAMAV_MAX_SCAN_TIME_MS:-1800000}
      CLAMD_CONF_MaxRecursion: ${CLAMAV_MAX_RECURSION:-32}
      CLAMD_CONF_MaxFiles: ${CLAMAV_MAX_FILES:-100000}
      CLAMD_CONF_HeuristicAlerts: "yes"
      CLAMD_CONF_HeuristicScanPrecedence: "yes"
      CLAMD_CONF_AlertBrokenExecutables: "yes"
      CLAMD_CONF_AlertEncrypted: "yes"
      CLAMD_CONF_AlertOLE2Macros: "yes"
      CLAMD_CONF_AlertExceedsMax: "yes"
      CLAMD_CONF_DetectPUA: ${CLAMAV_DETECT_PUA:-yes}
    volumes:
      - ${CLAMAV_DATA_DIR:-./data/clamav}:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "printf 'PING\n' | nc 127.0.0.1 3310 | grep PONG"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 10
