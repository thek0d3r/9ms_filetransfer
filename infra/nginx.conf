events { worker_connections 2048; }

http {
  log_format json escape=json '{"time":"$time_iso8601","request_id":"$request_id","remote":"$remote_addr","method":"$request_method","uri":"$uri","status":$status,"bytes":$body_bytes_sent,"elapsed":$request_time}';
  access_log /var/log/nginx/access.log json;
  server_tokens off;
  client_max_body_size 1m;
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

  upstream web { server web:3000; keepalive 32; }

  server {
    listen 80 default_server;
    add_header X-Frame-Options DENY always;

    location /api/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_request_buffering off;
      proxy_buffering off;
      proxy_read_timeout 1h;
    }

    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }
  }
}
