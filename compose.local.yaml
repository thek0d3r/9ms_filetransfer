services:
  web:
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_FORCE_PATH_STYLE: "true"
      S3_SERVER_SIDE_ENCRYPTION: "none"
    depends_on:
      minio-init:
        condition: service_completed_successfully

  worker:
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_FORCE_PATH_STYLE: "true"
      S3_SERVER_SIDE_ENCRYPTION: "none"
    depends_on:
      minio-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-9ms-local}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-local-development-secret}
      MINIO_API_CORS_ALLOW_ORIGIN: ${APP_URL:-http://localhost:3000}
    ports:
      - "9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - ${MINIO_DATA_DIR:-./data/minio}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-9ms-local}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-local-development-secret}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 "$${S3_ACCESS_KEY_ID}" "$${S3_SECRET_ACCESS_KEY}" &&
        mc mb --ignore-existing local/9ms-transfers &&
        mc anonymous set none local/9ms-transfers
